
<div id="erd" style="padding:16px 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e2a3a' : '#e6f1fb',
    primaryBorderColor: dark ? '#378add' : '#185fa5',
    attributeBackgroundColorEven: dark ? '#1a1a1a' : '#f8f9fa',
    attributeBackgroundColorOdd: dark ? '#141414' : '#ffffff',
  },
});
const diagram = `erDiagram
  USER_CREDENTIALS {
    bigserial id PK
    varchar email
    varchar password
    varchar role
  }
  EMPLOYERS {
    bigserial id PK
    varchar organization_name
    varchar email
    varchar address
    varchar contact_no
    timestamp created_at
  }
  JOB_SEEKERS {
    bigserial id PK
    varchar name
    varchar email
    varchar address
    varchar contact_no
    varchar skill_set
    varchar resume_url
    timestamp created_at
  }
  JOBS {
    bigserial id PK
    varchar title
    varchar location
    varchar description
    varchar experience
    decimal salary
    varchar status
    varchar skills
    bigint employer_id FK
    varchar company_name
    timestamp posted_at
  }
  JOB_APPLICATIONS {
    bigserial id PK
    bigint job_id FK
    bigint job_seeker_id FK
    bigint employer_id FK
    varchar status
    timestamp applied_at
  }
  MESSAGES {
    bigserial id PK
    varchar content
    bigint sender_id
    varchar sender_type
    bigint receiver_id
    varchar receiver_type
    bigint job_id FK
    bigint employer_id FK
    bigint job_seeker_id FK
    timestamp sent_at
  }

  EMPLOYERS ||--o{ JOBS : "posts"
  EMPLOYERS ||--o{ JOB_APPLICATIONS : "receives"
  JOB_SEEKERS ||--o{ JOB_APPLICATIONS : "submits"
  JOBS ||--o{ JOB_APPLICATIONS : "has"
  JOBS ||--o{ MESSAGES : "scopes"
  EMPLOYERS ||--o{ MESSAGES : "sends/receives"
  JOB_SEEKERS ||--o{ MESSAGES : "sends/receives"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
