server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:

      discovery:
        locator:
          enabled: false

      routes:

        # ========================================================
        # EMPLOYER ONLY ROUTES
        # ========================================================
        - id: employer-create-job
          uri: lb://JOB-SERVICE
          predicates:
            - Path=/job
            - Method=POST
          filters:
            - name: RoleFilter
              args:
                allowedRoles: EMPLOYER

        - id: employer-get-applications-for-job
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/application/job/**
            - Method=GET
          filters:
            - name: RoleFilter
              args:
                allowedRoles: EMPLOYER

        # ========================================================
        # JOBSEEKER ONLY ROUTES
        # ========================================================
        - id: jobseeker-apply-for-job
          uri: lb://APPLICATION-SERVICE
          predicates:
            - Path=/application
            - Method=POST
          filters:
            - name: RoleFilter
              args:
                allowedRoles: JOBSEEKER

        - id: jobseeker-send-message
          uri: lb://MESSAGE-SERVICE
          predicates:
            - Path=/message
            - Method=POST
          filters:
            - name: RoleFilter
              args:
                allowedRoles: JOBSEEKER

        # ========================================================
        # SHARED ROUTES (both roles)
        # ========================================================
        - id: shared-job-listing
          uri: lb://JOB-SERVICE
          predicates:
            - Path=/job/**
            - Method=GET

        - id: shared-get-messages
          uri: lb://MESSAGE-SERVICE
          predicates:
            - Path=/message/**
            - Method=GET

        # ========================================================
        # PUBLIC ROUTES (no auth)
        # ========================================================
        - id: auth-login
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/login
            - Method=POST

eureka:
  instance:
    prefer-ip-address: true
    instance-id: api-gateway:${server.port}

  client:
    register-with-eureka: true
    fetch-registry: true
    registryFetchIntervalSeconds: 10
    service-url:
      defaultZone: http://localhost:8761/eureka
