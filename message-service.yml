spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/message_db
    username: postgres
    password: Neon@1689

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true

  cloud:
    loadbalancer:
      retry:
        enabled: true

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

eureka:
  instance:
    prefer-ip-address: true
    instance-id: message-service:${server.port}

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
