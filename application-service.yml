spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/application_db
    username: postgres
    password: Neon@1689

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true

eureka:
  instance:
    prefer-ip-address: true
    instance-id: application-service:${server.port}

  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
